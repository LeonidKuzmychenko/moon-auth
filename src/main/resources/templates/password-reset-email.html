<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset your password</title>
</head>
<body>
    <h1>Reset your password</h1>
    <p>Please use the following token to reset your password:</p>
    <h2 th:text="${token}"></h2>
    <p>The token is valid for 30 minutes.</p>
</body>
</html>
